<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>路线编辑器 · 冈仁波齐转山</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; width: 100%; font-family: -apple-system, "PingFang SC", sans-serif; background: #111; color: #eee; overflow: hidden; }
    #map { position: absolute; inset: 0; z-index: 0; background: #0d0d0f; }

    .toolbar {
      position: absolute; z-index: 1000; top: 12px; left: 12px; right: 12px;
      display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
      background: rgba(18,18,22,0.92); backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 10px;
      padding: 10px 14px;
    }
    .toolbar button {
      background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.15);
      padding: 6px 14px; border-radius: 6px; font-size: 13px; cursor: pointer;
      white-space: nowrap;
    }
    .toolbar button:hover { background: rgba(255,255,255,0.2); }
    .toolbar button.active { background: rgba(255,205,85,0.3); border-color: #ffcd55; color: #ffcd55; }
    .toolbar button.danger { border-color: rgba(255,80,80,0.4); }
    .toolbar button.danger:hover { background: rgba(255,80,80,0.2); }
    .toolbar select {
      background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.15);
      padding: 6px 10px; border-radius: 6px; font-size: 13px;
    }
    .toolbar .sep { width: 1px; height: 24px; background: rgba(255,255,255,0.15); }
    .toolbar .info { font-size: 12px; color: rgba(255,255,255,0.6); }

    .status-bar {
      position: absolute; z-index: 1000; bottom: 12px; left: 12px; right: 12px;
      background: rgba(18,18,22,0.88); backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 10px;
      padding: 10px 14px; font-size: 12px; color: rgba(255,255,255,0.6);
      display: flex; justify-content: space-between; align-items: center;
    }

    .crosshair { cursor: crosshair !important; }

    /* 拖拽手柄 */
    .edit-handle {
      width: 10px; height: 10px; border-radius: 50%;
      background: #fff; border: 2px solid #ffcd55;
      cursor: grab; box-shadow: 0 0 6px rgba(255,205,85,0.6);
    }
    .edit-handle:hover { transform: scale(1.3); }
    .edit-handle.secondary { border-color: #8a7a5a; background: #ccc; }
  </style>
</head>
<body>
  <div id="map" class="crosshair"></div>

  <div class="toolbar">
    <select id="routeSelect">
      <option value="main">主线（全线）</option>
      <option value="s0">支线：大天葬台路线</option>
      <option value="s1">支线：曲古寺之路</option>
      <option value="s2">支线：哲日浦寺之路</option>
      <option value="s3">支线：空行母之路</option>
    </select>
    <div class="sep"></div>
    <button id="undoBtn">↩ 撤销</button>
    <button id="clearBtn" class="danger">✕ 清空当前线</button>
    <div class="sep"></div>
    <button id="refToggle">👁 参考线</button>
    <div class="sep"></div>
    <button id="exportBtn" style="background:rgba(80,180,80,0.2);border-color:rgba(80,180,80,0.4);">↓ 导出 JSON</button>
    <span class="info" id="pointCount">0 个点</span>
  </div>

  <div class="status-bar">
    <span id="statusText">点击底图描绘路线，右键撤销最后一点</span>
    <span id="coordDisplay">—</span>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    // ---- 状态 ----
    const routes = {
      main: [],
      secondary: [
        { name: "大天葬台路线", coords: [] },
        { name: "曲古寺之路", coords: [] },
        { name: "哲日浦寺之路", coords: [] },
        { name: "空行母之路", coords: [] }
      ]
    };

    let currentKey = "main";           // "main" | "s0" | "s1" | "s2" | "s3"
    let editLine = null;               // 当前正在编辑的 polyline
    let editMarkers = [];              // 当前路线的可拖拽标记
    let refLines = [];                 // 参考线（旧 KMZ 路线）
    let refVisible = true;
    let oldRoutes = null;              // 旧路线数据（参考用）
    let map;

    // ---- 辅助 ----
    function getCurrentCoords() {
      if (currentKey === "main") return routes.main;
      const idx = parseInt(currentKey.slice(1));
      return routes.secondary[idx].coords;
    }
    function setCurrentCoords(arr) {
      if (currentKey === "main") routes.main = arr;
      else {
        const idx = parseInt(currentKey.slice(1));
        routes.secondary[idx].coords = arr;
      }
    }

    function updateCount() {
      document.getElementById("pointCount").textContent = getCurrentCoords().length + " 个点";
    }

    // ---- 地图初始化 ----
    async function init() {
      const bmRes = await fetch("data/basemap.json");
      const bm = await bmRes.json();
      const imgBounds = L.latLngBounds(bm.bounds[0], bm.bounds[1]);

      map = L.map("map", {
        zoomControl: true,
        attributionControl: false,
        minZoom: 11,
        maxZoom: 16,
        maxBounds: imgBounds.pad(0.08),
        maxBoundsViscosity: 0.9,
        zoomSnap: 0.25,
        zoomDelta: 0.5
      }).fitBounds(imgBounds);

      L.tileLayer("assets/tiles/{z}/{x}/{y}.png", {
        minZoom: 11, maxZoom: 16, tileSize: 256, noWrap: true, bounds: imgBounds
      }).addTo(map);

      setTimeout(() => map.invalidateSize(), 200);

      // 加载 POI 标记作为参照
      const poisRes = await fetch("data/pois.json");
      const pois = await poisRes.json();
      pois.forEach(poi => {
        const icon = L.divIcon({
          className: "",
          html: `<div style="width:10px;height:10px;border-radius:50%;background:rgba(255,220,140,0.8);border:1.5px solid #fff;box-shadow:0 0 6px rgba(255,220,140,0.5);"></div>`,
          iconSize: [10, 10], iconAnchor: [5, 5]
        });
        L.marker([poi.lat, poi.lng], { icon, interactive: false }).addTo(map)
          .bindTooltip(poi.name, { permanent: false, direction: "top", offset: [0, -8], className: "poi-tip" });
      });

      // 加载旧路线作为参考
      try {
        const routesRes = await fetch("data/routes.json");
        oldRoutes = await routesRes.json();
        drawRefLines();
      } catch(e) { /* no old routes */ }

      // 初始化编辑线
      editLine = L.polyline([], { color: "#00ff88", weight: 3, opacity: 0.9 }).addTo(map);

      // 鼠标坐标显示
      map.on("mousemove", (e) => {
        document.getElementById("coordDisplay").textContent =
          e.latlng.lat.toFixed(6) + ", " + e.latlng.lng.toFixed(6);
      });

      // 左键添加点
      map.on("click", (e) => {
        const coords = getCurrentCoords();
        coords.push([parseFloat(e.latlng.lat.toFixed(6)), parseFloat(e.latlng.lng.toFixed(6))]);
        addDragMarker(coords.length - 1, e.latlng);
        refreshLine();
        updateCount();
      });

      // 右键撤销
      map.on("contextmenu", (e) => {
        e.originalEvent.preventDefault();
        undo();
      });
    }

    // ---- 参考线 ----
    function drawRefLines() {
      if (!oldRoutes) return;
      // 清旧
      refLines.forEach(l => map.removeLayer(l));
      refLines = [];
      // 主线
      const ml = L.polyline(oldRoutes.main, { color: "#ff4444", weight: 2, opacity: 0.5, dashArray: "4,4" }).addTo(map);
      refLines.push(ml);
      // 支线
      oldRoutes.secondary.forEach(sr => {
        const sl = L.polyline(sr.coords, { color: "#ff8844", weight: 1.5, opacity: 0.4, dashArray: "3,4" }).addTo(map);
        refLines.push(sl);
      });
    }

    function toggleRef() {
      refVisible = !refVisible;
      refLines.forEach(l => { l.setStyle({ opacity: refVisible ? 0.5 : 0 }); });
      document.getElementById("refToggle").classList.toggle("active", refVisible);
    }

    // ---- 编辑操作 ----
    function addDragMarker(idx, latlng) {
      const isMain = currentKey === "main";
      const icon = L.divIcon({
        className: "",
        html: `<div class="edit-handle ${isMain ? "" : "secondary"}"></div>`,
        iconSize: [10, 10], iconAnchor: [5, 5]
      });
      const m = L.marker(latlng, { icon, draggable: true, zIndexOffset: 500 }).addTo(map);
      m._ptIdx = idx;
      m.on("drag", () => {
        const coords = getCurrentCoords();
        const pos = m.getLatLng();
        coords[m._ptIdx] = [parseFloat(pos.lat.toFixed(6)), parseFloat(pos.lng.toFixed(6))];
        refreshLine();
      });
      editMarkers.push(m);
    }

    function refreshLine() {
      editLine.setLatLngs(getCurrentCoords());
    }

    function rebuildMarkers() {
      editMarkers.forEach(m => map.removeLayer(m));
      editMarkers = [];
      const coords = getCurrentCoords();
      coords.forEach((c, i) => {
        addDragMarker(i, L.latLng(c[0], c[1]));
      });
      refreshLine();
      updateCount();
    }

    function undo() {
      const coords = getCurrentCoords();
      if (coords.length === 0) return;
      coords.pop();
      const last = editMarkers.pop();
      if (last) map.removeLayer(last);
      refreshLine();
      updateCount();
    }

    function clearCurrent() {
      if (!confirm("确认清空当前路线的所有点？")) return;
      setCurrentCoords([]);
      rebuildMarkers();
    }

    function switchRoute(key) {
      currentKey = key;
      const isMain = currentKey === "main";
      editLine.setStyle({ color: isMain ? "#00ff88" : "#66ccff", weight: isMain ? 3 : 2 });
      rebuildMarkers();
      document.getElementById("statusText").textContent =
        "编辑中：" + document.getElementById("routeSelect").selectedOptions[0].text;
    }

    // ---- 导出 ----
    function exportJSON() {
      const out = {
        main: routes.main,
        secondary: routes.secondary.map(s => ({ name: s.name, coords: s.coords }))
      };
      const blob = new Blob([JSON.stringify(out, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "routes.json";
      a.click();
      URL.revokeObjectURL(url);

      // 同时输出到控制台
      console.log("=== 导出的路线数据 ===");
      console.log("主线:", routes.main.length, "点");
      routes.secondary.forEach(s => console.log("支线:", s.name, s.coords.length, "点"));
      console.log(JSON.stringify(out));

      document.getElementById("statusText").textContent =
        "已导出！主线 " + routes.main.length + " 点，支线 " +
        routes.secondary.map(s => s.coords.length).join("/") + " 点";
    }

    // ---- 绑定事件 ----
    document.getElementById("undoBtn").addEventListener("click", undo);
    document.getElementById("clearBtn").addEventListener("click", clearCurrent);
    document.getElementById("refToggle").addEventListener("click", toggleRef);
    document.getElementById("exportBtn").addEventListener("click", exportJSON);
    document.getElementById("routeSelect").addEventListener("change", (e) => {
      switchRoute(e.target.value);
    });

    // 快捷键
    document.addEventListener("keydown", (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === "z") { e.preventDefault(); undo(); }
    });

    init();
  </script>
</body>
</html>
