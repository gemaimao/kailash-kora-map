<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>后台管理 · 冈仁波齐转山</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; width: 100%; font-family: -apple-system, "PingFang SC", sans-serif; background: #0d0d0f; color: #eee; overflow: hidden; }

    .admin-nav {
      position: absolute; top: 0; left: 0; right: 0; height: 44px; z-index: 100;
      display: flex; align-items: center; gap: 0;
      background: rgba(18,18,22,0.98); border-bottom: 1px solid rgba(255,255,255,0.08);
      padding: 0 16px;
    }
    .admin-nav .brand {
      font-size: 13px; letter-spacing: 2px; color: rgba(255,255,255,0.5); padding: 12px 16px 12px 0;
      border-right: 1px solid rgba(255,255,255,0.08); margin-right: 4px;
    }
    .admin-nav .tab {
      background: none; border: none; color: rgba(255,255,255,0.45); font-size: 14px;
      padding: 12px 20px; cursor: pointer; border-bottom: 2px solid transparent;
      transition: color 0.2s, border-color 0.2s;
    }
    .admin-nav .tab:hover { color: rgba(255,255,255,0.7); }
    .admin-nav .tab.active { color: #ffcd55; border-bottom-color: #ffcd55; }

    .admin-nav .spacer { flex: 1; }
    .admin-nav .link {
      font-size: 12px; color: rgba(255,255,255,0.35); text-decoration: none; padding: 8px 12px;
    }
    .admin-nav .link:hover { color: rgba(255,255,255,0.7); }

    .editor-frame {
      position: absolute; top: 44px; left: 0; right: 0; bottom: 0;
      width: 100%; height: calc(100% - 44px); border: none; background: #0d0d0f;
    }
  </style>
</head>
<body>
  <nav class="admin-nav">
    <span class="brand">后台管理</span>
    <button class="tab active" data-src="poi-editor.html">POI 编辑</button>
    <button class="tab" data-src="editor.html">路线编辑</button>
    <span class="spacer"></span>
    <a class="link" href="index.html" target="_blank">← 返回前台</a>
  </nav>
  <iframe class="editor-frame" id="editorFrame" src="poi-editor.html"></iframe>

  <script>
    const tabs = document.querySelectorAll('.tab');
    const frame = document.getElementById('editorFrame');
    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        tabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        frame.src = tab.dataset.src;
      });
    });
  </script>
</body>
</html>
